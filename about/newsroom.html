<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Howard AI Newsroom</title>

  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="../assets/style.css" />
</head>

<body>

  <!-- HEADER -->

  <header>
    <div class="container navbar">

      <a href="../index.html" class="logo">
        <img src="../logo-light.png" alt="Howard AI Logo">
      </a>

      <nav class="main-nav">

        <div class="nav-item">
          <a href="../index.html">Home</a>
        </div>

        <div class="nav-item">
          <a href="#">About</a>

          <div class="dropdown">
            <a href="../about/index.html">Overview</a>
            <a href="../about/howardai.html">Howard AI</a>
            <a href="../about/leadership.html">Leadership</a>
            <a href="../about/newsroom.html">Newsroom</a>
            <a href="../about/investors.html">Investors</a>
          </div>
        </div>

        <div class="nav-item">
          <a href="#">Store</a>

          <div class="dropdown">
            <a href="../store/index.html">All Products</a>
            <a href="../store/home.html">Howard Home</a>
            <a href="../store/pro.html">Howard Pro</a>
            <a href="../store/enterprise.html">Enterprise</a>
          </div>
        </div>

        <div class="nav-item">
          <a href="#">Support</a>

          <div class="dropdown">
            <a href="../support/index.html">Support Hub</a>
            <a href="../support/contact.html">Contact</a>
            <a href="../support/about-support.html">About Support</a>
            <a href="../support/faqs.html">FAQs</a>
          </div>
        </div>

      </nav>

    </div>
  </header>

  <!-- HERO -->

  <section class="section">
    <div class="container">

      <div class="hero-tag">
        Howard AI Newsroom
      </div>

      <h1 class="section-title">
        Latest Updates
      </h1>

      <p class="section-subtitle">
        Product updates, launch milestones, Houston expansion news, and company announcements from Howard AI.
      </p>

    </div>
  </section>

  <!-- NEWS FEED -->

  <section class="section" style="padding-top: 0;">
    <div class="container">

      <div id="featured-story"></div>

      <div id="news-container" class="news-grid"></div>

    </div>
  </section>

  <!-- SCRIPT -->

  <script>

    async function loadNews() {

      try {

        const response = await fetch('./news.json');
        const articles = await response.json();

        const featuredContainer =
          document.getElementById('featured-story');

        const newsContainer =
          document.getElementById('news-container');

        if (articles.length > 0) {

          const featured = articles[0];

          featuredContainer.innerHTML = `

            <div class="card" style="
              margin-bottom: 32px;
              padding: 48px;
            ">

              <div class="news-meta">
                FEATURED • ${featured.date}
              </div>

              <h2 style="
                font-size: 2.8rem;
                margin-bottom: 20px;
                line-height: 1.05;
              ">
                ${featured.title}
              </h2>

              <p style="
                font-size: 1.1rem;
                color: #bdbdbd;
                max-width: 800px;
              ">
                ${featured.description}
              </p>

            </div>

          `;

          articles.slice(1).forEach(article => {

            const card = document.createElement('div');

            card.classList.add('news-card');

            card.innerHTML = `

              <div class="news-meta">
                ${article.date}
              </div>

              <h2>
                ${article.title}
              </h2>

              <p>
                ${article.description}
              </p>

            `;

            newsContainer.appendChild(card);

          });

        }

      } catch (error) {

        console.error('Failed to load newsroom:', error);

        document.getElementById('news-container').innerHTML = `

          <div class="news-card">

            <div class="news-meta">
              ERROR
            </div>

            <h2>
              Unable to load newsroom.
            </h2>

            <p>
              Please try again later.
            </p>

          </div>

        `;
      }
    }

    loadNews();

  </script>

</body>
</html>
