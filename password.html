<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>HowardAI</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-dark-bg);
      padding: var(--space-8);
    }
    .gate {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }
    .gate__logo {
      height: 32px;
      margin-bottom: var(--space-8);
    }
    .gate__badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-accent);
      border: 1px solid rgba(235,199,54,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      margin-bottom: var(--space-6);
    }
    .gate__headline {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-white);
      margin-bottom: var(--space-4);
    }
    .gate__body {
      font-size: 16px;
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      margin-bottom: var(--space-8);
    }
    .gate__form {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .gate__input {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      font-family: inherit;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      color: var(--color-white);
      text-align: center;
      outline: none;
      transition: border-color 0.15s ease;
      box-sizing: border-box;
      letter-spacing: 0.05em;
    }
    .gate__input::placeholder {
      color: rgba(255,255,255,0.25);
      letter-spacing: 0;
    }
    .gate__input:focus {
      border-color: rgba(235,199,54,0.5);
    }
    .gate__btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      background: var(--color-accent);
      color: #1a1a1a;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    .gate__btn:hover {
      opacity: 0.88;
    }
    .gate__error {
      font-size: 14px;
      color: var(--color-error);
      min-height: 20px;
      margin-top: var(--space-1);
    }
    .gate__footer {
      margin-top: var(--space-10);
      font-size: 13px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="gate">
    <img src="logo-light.png" alt="HowardAI" class="gate__logo" />
    <div class="gate__badge">Coming Soon</div>
    <h1 class="gate__headline">Something big<br />is almost ready.</h1>
    <p class="gate__body">
      Howard doesn't open the door for just anyone.<br />
      If you've got the password, you know what you're walking into.<br />
      If you don't — you'll find out when everyone else does.
    </p>
    <form class="gate__form" id="gate-form" novalidate>
      <input
        class="gate__input"
        type="password"
        id="gate-input"
        placeholder="Enter password"
        autocomplete="current-password"
        autofocus
      />
      <p class="gate__error" id="gate-error" aria-live="polite"></p>
      <button class="gate__btn" type="submit">Enter</button>
    </form>
    <p class="gate__footer">© 2026 HowardAI, LLC · The Woodlands, Texas</p>
  </div>

  <script>
    document.getElementById('gate-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var input = document.getElementById('gate-input').value.trim().toLowerCase();
      if (input === 'cloudaisucks') {
        sessionStorage.setItem('hw_auth', '1');
        window.location.replace('/');
      } else {
        var err = document.getElementById('gate-error');
        err.textContent = 'That's not it. Try again.';
        document.getElementById('gate-input').value = '';
        document.getElementById('gate-input').focus();
      }
    });
  </script>
</body>
</html>
