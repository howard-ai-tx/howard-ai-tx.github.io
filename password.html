<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>HowardAI</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-white);
      padding: var(--space-8);
    }
    .gate {
      width: 100%;
      max-width: 480px;
      background: var(--color-light-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-large);
      padding: var(--space-12) var(--space-12) var(--space-10);
      text-align: center;
    }
    .gate__logo {
      height: 28px;
      margin: 0 auto var(--space-8);
      display: block;
    }
    .gate__badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-accent-dark, #b8960f);
      background: rgba(235,199,54,0.12);
      border: 1px solid rgba(235,199,54,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      margin-bottom: var(--space-6);
    }
    .gate__headline {
      font-size: clamp(24px, 5vw, 34px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--color-text-primary);
      margin-bottom: var(--space-4);
    }
    .gate__body {
      font-size: 15px;
      color: var(--color-text-body);
      line-height: 1.7;
      margin-bottom: var(--space-8);
    }
    .gate__form {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .gate__input {
      width: 100%;
      padding: 13px 18px;
      font-size: 15px;
      font-family: inherit;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      color: var(--color-text-primary);
      text-align: center;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-sizing: border-box;
      letter-spacing: 0.05em;
    }
    .gate__input::placeholder {
      color: var(--color-text-muted);
      letter-spacing: 0;
    }
    .gate__input:focus {
      border-color: var(--color-action);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
    }
    .gate__error {
      font-size: 13px;
      color: var(--color-error);
      min-height: 18px;
    }
    .gate__footer {
      margin-top: var(--space-8);
      font-size: 12px;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <div class="gate">
    <img src="logo-dark.png" alt="HowardAI" class="gate__logo" />
    <div class="gate__badge">Coming Soon</div>
    <h1 class="gate__headline">Something is almost ready.</h1>
    <p class="gate__body">
      Howard doesn't open the door for just anyone. If you've got the password, you know what you're walking into. If you don't — you'll find out when everyone else does.
    </p>
    <form class="gate__form" id="gate-form" novalidate>
      <input
        class="gate__input"
        type="password"
        id="gate-input"
        placeholder="Enter password"
        autocomplete="current-password"
        autofocus
      />
      <p class="gate__error" id="gate-error" aria-live="polite"></p>
      <button class="btn btn--primary btn--lg" type="submit" style="width:100%; justify-content:center;">Enter</button>
    </form>
    <p class="gate__footer">© 2026 HowardAI, LLC &middot; The Woodlands, Texas</p>
  </div>

  <script>
    document.getElementById('gate-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var input = document.getElementById('gate-input').value.trim().toLowerCase();
      if (input === 'cloudaisucks') {
        sessionStorage.setItem('hw_auth', '1');
        window.location.replace('/');
      } else {
        document.getElementById('gate-error').textContent = "That is not it. Try again.";
        document.getElementById('gate-input').value = '';
        document.getElementById('gate-input').focus();
      }
    });
  </script>
</body>
</html>
